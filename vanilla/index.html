<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technical Proof</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <header class="card__header">
        <h1>This is a technical proof</h1>
        <p>
          Lorem ipsum dolor sit amet consectetur adipiscing, elit mus primis nec
          inceptos. Lacinia habitasse arcu molestie maecenas cursus quam nunc,
          hendrerit posuere augue fames dictumst placerat porttitor, dis mi
          pharetra vestibulum venenatis phasellus.
        </p>
      </header>

      <section class="card__content">
        <div class="list-container">
          <ul id="item-list"></ul>
        </div>
      </section>

      <footer class="card__actions">
        <div class="card__actions-left">
          <button type="button" aria-label="Undo" id="undo-item-button">
            ↺
          </button>
          <button type="button" id="remove-item-button">Delete</button>
        </div>
        <button type="button" id="open-modal-button">Add</button>
      </footer>
    </main>

    <dialog id="item-modal" aria-labelledby="modal-title">
      <form method="dialog">
        <h2 id="modal-title">Add item to list</h2>
        <label for="new-item-input" class="sr-only">New item</label>
        <input
          id="new-item-input"
          type="text"
          placeholder="Type the text here..."
        />
        <div>
          <button type="submit" id="add-item-button">Add</button>
          <button type="button" id="cancel-modal-button">Cancel</button>
        </div>
      </form>
    </dialog>
    <script src="list.js"></script>
    <script src="modal.js"></script>
    <script>
      const list = createList(
        document.getElementById("item-list"),
        document.getElementById("remove-item-button"),
        document.getElementById("undo-item-button"),
      );
      list.renderItems();
      initModal({
        modal: document.getElementById("item-modal"),
        input: document.getElementById("new-item-input"),
        openModalButton: document.getElementById("open-modal-button"),
        cancelModalButton: document.getElementById("cancel-modal-button"),
        onAddItem: list.addItem,
      });
    </script>
  </body>
</html>
